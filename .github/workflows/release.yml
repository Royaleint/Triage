name: Package and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Leave empty to use the current ref.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract current version changelog
        run: |
          # Determine the tag to extract notes for. For tag-push triggers,
          # github.ref_name is the tag (e.g. v1.0.0). For workflow_dispatch,
          # prefer the manual input, fall back to github.ref_name.
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          echo "Extracting release notes for tag: $TAG"

          # Extract the section matching the tag's heading.
          # CHANGELOG headings look like: `## v1.0.0 — ERF Reforged`
          # Match `## $TAG` at start of line, optionally followed by space+title.
          # Stop at the next `## v` heading (next version section).
          awk -v tag="$TAG" \
            'BEGIN{re="^## "tag"($| )"} \
             $0 ~ re {found=1; print; next} \
             /^## v/{if(found) exit} \
             found' CHANGELOG.md > RELEASE_NOTES.md

          # Fail loudly if no matching section was found — pushing a tag
          # without a corresponding CHANGELOG entry is a release-process bug
          # that should block the release rather than silently extract the
          # top entry (which previously caused v0.0.2 to ship with v1.0.0
          # release notes).
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "ERROR: No CHANGELOG.md section found for tag '$TAG'." >&2
            echo "Expected a heading like '## $TAG' or '## $TAG — title'." >&2
            exit 1
          fi

          echo "--- Extracted release notes for $TAG ---"
          cat RELEASE_NOTES.md

      - name: Package and Release (Retail)
        uses: BigWigsMods/packager@v2
        with:
          args: -g retail
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Release (Classic Era)
        uses: BigWigsMods/packager@v2
        with:
          args: -g classic
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Release (Pandaria Classic)
        uses: BigWigsMods/packager@v2
        with:
          args: -g mists
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
